# A workflow that runs Trivy to scan the action Docker image

name: Trivy workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '32 12 * * 0'
  workflow_dispatch:

env:
  BRANCH_NAME: ${{ github.ref_name }}
  TRIVY_SEVERITY: CRITICAL,HIGH
  APP_IMAGE_TAG: trivy-scan-image:latest
  TRIVY_CACHE_DIR: .trivy

permissions:
  contents: read

concurrency:
  group: trivy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  trivy:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@df199fb7be9f65074067a9eb93f12bb4c5547cf2 # v2.13.3
        with:
          egress-policy: block
          disable-telemetry: true
          allowed-endpoints: >
            api.github.com:443
            auth.docker.io:443
            deb.debian.org:80
            get.trivy.dev:443
            ghcr.io:443
            github.com:443
            mirror.gcr.io:443
            objects.githubusercontent.com:443
            pkg-containers.githubusercontent.com:443
            production.cloudflare.docker.com:443
            registry-1.docker.io:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443

      - name: Prepare Trivy cache directory
        run: mkdir -p ${{ env.TRIVY_CACHE_DIR }}

      # Cache directory for trivy
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.TRIVY_CACHE_DIR }}
          key: ${{ runner.os }}-trivy-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-trivy-

      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Build an image from Dockerfile
        run: |
          docker build -t ${{ env.APP_IMAGE_TAG }} .

      - name: Run Trivy vulnerability scanner (SARIF)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.APP_IMAGE_TAG }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: ${{ env.TRIVY_SEVERITY }}
          cache-dir: ${{ env.TRIVY_CACHE_DIR }}
          exit-code: "0" # Do not fail the job when vulnerabilities are found; SARIF upload handles tracking
          ignore-unfixed: true
          vuln-type: 'os,library'

      - name: Run Trivy vulnerability scanner (text)
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.APP_IMAGE_TAG }}
          format: 'table'
          output: 'trivy-app-image.txt'
          severity: ${{ env.TRIVY_SEVERITY }}
          cache-dir: ${{ env.TRIVY_CACHE_DIR }}
          ignore-unfixed: true
          vuln-type: 'os,library'

      # https://github.com/aquasecurity/trivy-action/issues/12 for an explanation
      - name: Correct Trivy cache permissions
        if: always()
        continue-on-error: true
        run: sudo chown -R "$USER":"$GROUP" ${{ env.TRIVY_CACHE_DIR }}

      - name: Upload Trivy scan results to GitHub Security tab
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@959cbb7472c4d4ad70cdfe6f4976053fe48ab394 # tag=v21.3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Publish Trivy Output to Summary
        if: always()
        run: |
          {
            echo "### 🛡️ Trivy Scan Results"
            if [[ -s trivy-app-image.txt ]]; then
              echo "#### Image Scan (${{ env.APP_IMAGE_TAG }})"
              echo "<details><summary>Expand Details</summary>"
              echo ""
              echo '```'
              cat trivy-app-image.txt
              echo '```'
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: trivy-app-reports
          path: |
            trivy-app-image.txt

  create-vulnerability-issues:
    runs-on: ubuntu-latest
    needs: trivy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      issues: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@df199fb7be9f65074067a9eb93f12bb4c5547cf2 # v2.13.3
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            files.pythonhosted.org:443
            github.com:443
            pypi.org:443

      - name: Checkout source
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Download Trivy reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: trivy-app-reports

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create GitHub issues for vulnerabilities
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python .github/scripts/create_trivy_issues.py
