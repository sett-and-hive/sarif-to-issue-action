# A workflow that periodically reviews .trivyignore entries for available patches

name: Review .trivyignore

on:
  schedule:
    # Run every Wednesday at 10:00 AM CST / 11:00 AM CDT (4:00 PM UTC)
    - cron: '0 16 * * 3'
  workflow_dispatch:
    inputs:
      trivyignore_path:
        description: 'Path to .trivyignore file'
        required: false
        default: '.trivyignore'
        type: string

permissions:
  contents: read
  issues: write

jobs:
  review-trivyignore:
    runs-on: ubuntu-latest
    name: Review ignored vulnerabilities

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@df199fb7be9f65074067a9eb93f12bb4c5547cf2 # v2.13.3
        with:
          egress-policy: audit

      - name: Checkout source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Review .trivyignore entries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TRIVYIGNORE_PATH: ${{ inputs.trivyignore_path || '.trivyignore' }}
        run: |
          python .github/scripts/review_trivyignore.py

      - name: Publish summary
        if: always()
        run: |
          {
            echo "### 🔄 .trivyignore Review Completed"
            echo ""
            echo "The review of vulnerabilities in \`.trivyignore\` has been completed."
            echo "Check the tracking issue for detailed findings."
          } >> "$GITHUB_STEP_SUMMARY"
